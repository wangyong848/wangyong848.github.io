<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to My Profile</h1>
        <!-- Existing navigation goes here -->
    </header>
    <section id="profile">
        <div class="corner-badge">
            <span>Researcher</span>
            <span>● Online — replies in 24–48h</span>
        </div>
        <div class="stats-panel">
            <div class="stat">
                <span>NLP:</span> <div class="bar" style="width: 90%;"></div>
            </div>
            <div class="stat">
                <span>Mental Health:</span> <div class="bar" style="width: 80%;"></div>
            </div>
            <div class="stat">
                <span>LLMs:</span> <div class="bar" style="width: 70%;"></div>
            </div>
            <div class="stat">
                <span>Psychology:</span> <div class="bar" style="width: 60%;"></div>
            </div>
        </div>
        <div class="hobbies">
            <h3>Hobbies:</h3>
            <p>Anime, Paradox games, galgame, history books</p>
        </div>
        <blockquote class="quote">
            <p>“其实我本来是想做AI伴侣的，就像彩叶开发辉夜姬一样，喜欢尝试不一样的东西，想要做出不一样的东西.”</p>
        </blockquote>
    </section>
    <footer>
        <p>&copy; 2026 Wang Yong</p>
    </footer>
</body>
</html>
